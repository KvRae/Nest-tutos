
services:
  db:
    image: postgres:15-alpine
    container_name: nest_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_db
    ports:
      # Use a non-default host port to avoid conflicts with a local PostgreSQL instance.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nest_network

  app:
    build:
      context: .
      target: builder
    container_name: nest_app
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: nest_db
      APP_PORT: 3000
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules/@nestjs/cli ]; then npm install --legacy-peer-deps; fi && npm run start:dev"
    networks:
      - nest_network

volumes:
  postgres_data:
  app_node_modules:

networks:
  nest_network:
    driver: bridge

